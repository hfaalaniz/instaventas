<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar — Máquina de Ventas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="css/variables.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: var(--color-text);
      letter-spacing: -0.5px;
    }
    .login-logo-title span { color: var(--color-primary); }
    .login-logo-sub {
      font-size: 13px;
      color: var(--color-text-3);
      margin-top: 4px;
    }
    .login-card {
      background: var(--color-bg-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      box-shadow: var(--shadow-lg);
    }
    .login-tabs {
      display: flex;
      gap: 4px;
      background: var(--color-bg-3);
      border-radius: var(--radius-md);
      padding: 3px;
      margin-bottom: 1.5rem;
    }
    .login-tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--color-text-3);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .login-tab.active {
      background: var(--color-bg-2);
      color: var(--color-text);
      box-shadow: var(--shadow-sm);
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--color-primary); }
    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s;
      margin-top: 1.25rem;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0;
      color: var(--color-text-3);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }
    .btn-google {
      width: 100%;
      padding: 10px;
      background: var(--color-bg-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      color: var(--color-text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s;
    }
    .btn-google:hover { background: var(--color-bg-3); }
    .google-icon {
      width: 18px; height: 18px;
    }
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 13px;
      margin-top: 1rem;
      display: none;
    }
    .alert-error   { background: var(--color-red-bg);   color: var(--color-red);   border: 1px solid var(--color-red); }
    .alert-success { background: var(--color-green-bg); color: var(--color-green); border: 1px solid var(--color-green); }
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 12px;
      color: var(--color-text-3);
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: dark) {
      body { background: #0f1117; }
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <div class="login-logo-title">Insta<span>Ventas</span></div>
    <div class="login-logo-sub">Sistema Profesional de Ventas Automáticas</div>
  </div>

  <div class="login-card">
    <div class="login-tabs">
      <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Ingresar</button>
      <button class="login-tab"        id="tab-signup" onclick="switchTab('signup')">Crear cuenta</button>
    </div>

    <!-- Panel login -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="alert alert-error" id="login-error"></div>
      <button class="btn-primary" id="btn-login" onclick="handleLogin()">
        <i class="ti ti-login"></i> Ingresar
      </button>

      <div class="divider">o</div>

      <button class="btn-google" onclick="handleGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>
    </div>

    <!-- Panel signup -->
    <div class="panel" id="panel-signup">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="tu@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="signup-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="signup-pass2" placeholder="Repetir contraseña" />
      </div>
      <div class="alert alert-error"   id="signup-error"></div>
      <div class="alert alert-success" id="signup-success"></div>
      <button class="btn-primary" id="btn-signup" onclick="handleSignup()">
        <i class="ti ti-user-plus"></i> Crear cuenta gratis
      </button>
    </div>
  </div>

  <div class="login-footer">
    Al ingresar aceptás los términos de uso del sistema.
  </div>
</div>

<!-- Supabase JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase/client.js"></script>
<script>
  // Funciones de auth (inline — auth.js no se carga en login.html)
  async function loginWithEmail(email, password) {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    return data;
  }

  async function signUpWithEmail(email, password) {
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) throw error;
    return data;
  }

  async function loginWithGoogle() {
    const { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/login.html' }
    });
    if (error) throw error;
  }

  // Si ya hay sesión activa, redirigir al dashboard
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'index.html';
  });

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active',  tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('panel-login').classList.toggle('active',  tab === 'login');
    document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn._orig = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> Cargando...';
      btn.disabled = true;
    } else {
      btn.innerHTML = btn._orig || btn.innerHTML;
      btn.disabled = false;
    }
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError(id) {
    document.getElementById(id).style.display = 'none';
  }

  async function handleLogin() {
    hideError('login-error');
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-pass').value;
    if (!email || !password) { showError('login-error', 'Completá todos los campos'); return; }
    setLoading('btn-login', true);
    try {
      await loginWithEmail(email, password);
      window.location.href = 'index.html';
    } catch (e) {
      showError('login-error', e.message || 'Error al ingresar. Revisá tus credenciales.');
      setLoading('btn-login', false);
    }
  }

  async function handleSignup() {
    hideError('signup-error');
    document.getElementById('signup-success').style.display = 'none';
    const email  = document.getElementById('signup-email').value.trim();
    const pass   = document.getElementById('signup-pass').value;
    const pass2  = document.getElementById('signup-pass2').value;
    if (!email || !pass) { showError('signup-error', 'Completá todos los campos'); return; }
    if (pass.length < 6)  { showError('signup-error', 'La contraseña debe tener al menos 6 caracteres'); return; }
    if (pass !== pass2)   { showError('signup-error', 'Las contraseñas no coinciden'); return; }
    setLoading('btn-signup', true);
    try {
      await signUpWithEmail(email, pass);
      document.getElementById('signup-success').textContent = '✓ Cuenta creada. Revisá tu email para confirmar.';
      document.getElementById('signup-success').style.display = 'block';
    } catch (e) {
      showError('signup-error', e.message || 'Error al crear la cuenta.');
    }
    setLoading('btn-signup', false);
  }

  async function handleGoogle() {
    try { await loginWithGoogle(); } catch(e) { showError('login-error', e.message); }
  }

  // Enter para enviar formulario
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginActive = document.getElementById('panel-login').classList.contains('active');
    if (loginActive) handleLogin(); else handleSignup();
  });
</script>
</body>
</html>
