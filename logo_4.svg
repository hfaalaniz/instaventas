<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fondo navy profundo -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#041428"/>
      <stop offset="100%" stop-color="#020c1b"/>
    </radialGradient>

    <!-- Degradado M azul → cian -->
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0866FF"/>
    </linearGradient>

    <!-- Degradado aro exterior -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4FC3F7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0866FF" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Degradado línea texto -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4FC3F7" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#4FC3F7" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#0866FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0866FF" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow cian para la M -->
    <filter id="mGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow fuerte para capa blur detrás -->
    <filter id="mBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <!-- Glow punto central -->
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <!-- Glow sutil octágono -->
    <filter id="octGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

    <clipPath id="roundClip">
      <rect width="1024" height="1024" rx="210" ry="210"/>
    </clipPath>
  </defs>

  <!-- Fondo navy -->
  <rect width="1024" height="1024" rx="210" ry="210" fill="url(#bgGrad)"/>

  <!-- Grid de puntos -->
  <g clip-path="url(#roundClip)" opacity="0.10" fill="#4FC3F7">
    <!-- fila 1 -->
    <circle cx="80"  cy="80"  r="2"/><circle cx="176" cy="80"  r="2"/><circle cx="272" cy="80"  r="2"/><circle cx="368" cy="80"  r="2"/><circle cx="464" cy="80"  r="2"/><circle cx="560" cy="80"  r="2"/><circle cx="656" cy="80"  r="2"/><circle cx="752" cy="80"  r="2"/><circle cx="848" cy="80"  r="2"/><circle cx="944" cy="80"  r="2"/>
    <!-- fila 2 -->
    <circle cx="80"  cy="176" r="2"/><circle cx="176" cy="176" r="2"/><circle cx="272" cy="176" r="2"/><circle cx="368" cy="176" r="2"/><circle cx="464" cy="176" r="2"/><circle cx="560" cy="176" r="2"/><circle cx="656" cy="176" r="2"/><circle cx="752" cy="176" r="2"/><circle cx="848" cy="176" r="2"/><circle cx="944" cy="176" r="2"/>
    <!-- fila 3 -->
    <circle cx="80"  cy="272" r="2"/><circle cx="176" cy="272" r="2"/><circle cx="272" cy="272" r="2"/><circle cx="368" cy="272" r="2"/><circle cx="464" cy="272" r="2"/><circle cx="560" cy="272" r="2"/><circle cx="656" cy="272" r="2"/><circle cx="752" cy="272" r="2"/><circle cx="848" cy="272" r="2"/><circle cx="944" cy="272" r="2"/>
    <!-- fila 4 -->
    <circle cx="80"  cy="368" r="2"/><circle cx="176" cy="368" r="2"/><circle cx="272" cy="368" r="2"/><circle cx="368" cy="368" r="2"/><circle cx="464" cy="368" r="2"/><circle cx="560" cy="368" r="2"/><circle cx="656" cy="368" r="2"/><circle cx="752" cy="368" r="2"/><circle cx="848" cy="368" r="2"/><circle cx="944" cy="368" r="2"/>
    <!-- fila 5 -->
    <circle cx="80"  cy="464" r="2"/><circle cx="176" cy="464" r="2"/><circle cx="272" cy="464" r="2"/><circle cx="368" cy="464" r="2"/><circle cx="464" cy="464" r="2"/><circle cx="560" cy="464" r="2"/><circle cx="656" cy="464" r="2"/><circle cx="752" cy="464" r="2"/><circle cx="848" cy="464" r="2"/><circle cx="944" cy="464" r="2"/>
    <!-- fila 6 -->
    <circle cx="80"  cy="560" r="2"/><circle cx="176" cy="560" r="2"/><circle cx="272" cy="560" r="2"/><circle cx="368" cy="560" r="2"/><circle cx="464" cy="560" r="2"/><circle cx="560" cy="560" r="2"/><circle cx="656" cy="560" r="2"/><circle cx="752" cy="560" r="2"/><circle cx="848" cy="560" r="2"/><circle cx="944" cy="560" r="2"/>
    <!-- fila 7 -->
    <circle cx="80"  cy="656" r="2"/><circle cx="176" cy="656" r="2"/><circle cx="272" cy="656" r="2"/><circle cx="368" cy="656" r="2"/><circle cx="464" cy="656" r="2"/><circle cx="560" cy="656" r="2"/><circle cx="656" cy="656" r="2"/><circle cx="752" cy="656" r="2"/><circle cx="848" cy="656" r="2"/><circle cx="944" cy="656" r="2"/>
    <!-- fila 8 -->
    <circle cx="80"  cy="752" r="2"/><circle cx="176" cy="752" r="2"/><circle cx="272" cy="752" r="2"/><circle cx="368" cy="752" r="2"/><circle cx="464" cy="752" r="2"/><circle cx="560" cy="752" r="2"/><circle cx="656" cy="752" r="2"/><circle cx="752" cy="752" r="2"/><circle cx="848" cy="752" r="2"/><circle cx="944" cy="752" r="2"/>
    <!-- fila 9 -->
    <circle cx="80"  cy="848" r="2"/><circle cx="176" cy="848" r="2"/><circle cx="272" cy="848" r="2"/><circle cx="368" cy="848" r="2"/><circle cx="464" cy="848" r="2"/><circle cx="560" cy="848" r="2"/><circle cx="656" cy="848" r="2"/><circle cx="752" cy="848" r="2"/><circle cx="848" cy="848" r="2"/><circle cx="944" cy="848" r="2"/>
    <!-- fila 10 -->
    <circle cx="80"  cy="944" r="2"/><circle cx="176" cy="944" r="2"/><circle cx="272" cy="944" r="2"/><circle cx="368" cy="944" r="2"/><circle cx="464" cy="944" r="2"/><circle cx="560" cy="944" r="2"/><circle cx="656" cy="944" r="2"/><circle cx="752" cy="944" r="2"/><circle cx="848" cy="944" r="2"/><circle cx="944" cy="944" r="2"/>
  </g>

  <!-- Resplandor radial central cian -->
  <radialGradient id="centralGlow" cx="50%" cy="42%" r="45%">
    <stop offset="0%"   stop-color="#0866FF" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#0866FF" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="210" ry="210" fill="url(#centralGlow)"/>

  <!-- Octágono exterior (estilo HUD tech) -->
  <polygon
    points="512,132 736,212 852,420 852,580 736,788 512,868 288,788 172,580 172,420 288,212"
    fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Octágono glow detrás -->
  <polygon
    points="512,132 736,212 852,420 852,580 736,788 512,868 288,788 172,580 172,420 288,212"
    fill="none" stroke="#4FC3F7" stroke-width="4" opacity="0.08" filter="url(#octGlow)"/>

  <!-- Octágono interior sutil -->
  <polygon
    points="512,168 706,238 808,428 808,572 706,762 512,832 318,762 216,572 216,428 318,238"
    fill="none" stroke="#0866FF" stroke-width="0.8" opacity="0.25"/>

  <!-- Marcas HUD en los vértices del octágono -->
  <g stroke="#4FC3F7" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="512" y1="132" x2="480" y2="132"/><line x1="512" y1="132" x2="544" y2="132"/>
    <line x1="736" y1="212" x2="752" y2="196"/><line x1="736" y1="212" x2="756" y2="228"/>
    <line x1="852" y1="420" x2="872" y2="408"/><line x1="852" y1="420" x2="872" y2="432"/>
    <line x1="852" y1="580" x2="872" y2="568"/><line x1="852" y1="580" x2="872" y2="592"/>
    <line x1="512" y1="868" x2="480" y2="868"/><line x1="512" y1="868" x2="544" y2="868"/>
    <line x1="288" y1="212" x2="272" y2="196"/><line x1="288" y1="212" x2="268" y2="228"/>
    <line x1="172" y1="420" x2="152" y2="408"/><line x1="172" y1="420" x2="152" y2="432"/>
    <line x1="172" y1="580" x2="152" y2="568"/><line x1="172" y1="580" x2="152" y2="592"/>
  </g>

  <!-- === M: capa glow detrás === -->
  <g filter="url(#mBlur)" opacity="0.35">
    <line x1="318" y1="596" x2="318" y2="278" stroke="#4FC3F7" stroke-width="72" stroke-linecap="round"/>
    <line x1="706" y1="596" x2="706" y2="278" stroke="#0866FF" stroke-width="72" stroke-linecap="round"/>
    <line x1="318" y1="278" x2="512" y2="472" stroke="#4FC3F7" stroke-width="64" stroke-linecap="round"/>
    <line x1="706" y1="278" x2="512" y2="472" stroke="#0866FF" stroke-width="64" stroke-linecap="round"/>
  </g>

  <!-- === M nítida con degradado === -->
  <g filter="url(#mGlow)">
    <line x1="318" y1="596" x2="318" y2="278" stroke="url(#mGrad)" stroke-width="52" stroke-linecap="round"/>
    <line x1="706" y1="596" x2="706" y2="278" stroke="url(#mGrad)" stroke-width="52" stroke-linecap="round"/>
    <line x1="318" y1="278" x2="512" y2="472" stroke="url(#mGrad)" stroke-width="46" stroke-linecap="round"/>
    <line x1="706" y1="278" x2="512" y2="472" stroke="url(#mGrad)" stroke-width="46" stroke-linecap="round"/>
  </g>

  <!-- Punto central: glow -->
  <circle cx="512" cy="472" r="48" fill="#4FC3F7" filter="url(#dotGlow)" opacity="0.5"/>
  <!-- Punto central: anillo cian -->
  <circle cx="512" cy="472" r="26" fill="#4FC3F7"/>
  <!-- Punto central: núcleo blanco -->
  <circle cx="512" cy="472" r="13" fill="#ffffff"/>
  <!-- Highlight -->
  <circle cx="504" cy="464" r="5" fill="rgba(255,255,255,0.6)"/>

  <!-- Puntos vértice superiores de la M -->
  <circle cx="318" cy="278" r="11" fill="#4FC3F7" opacity="0.8"/>
  <circle cx="318" cy="278" r="5"  fill="#ffffff" opacity="0.9"/>
  <circle cx="706" cy="278" r="11" fill="#4FC3F7" opacity="0.8"/>
  <circle cx="706" cy="278" r="5"  fill="#ffffff" opacity="0.9"/>

  <!-- Líneas de datos laterales (estilo dashboard) -->
  <g stroke="#4FC3F7" stroke-linecap="round" opacity="0.20">
    <line x1="100" y1="380" x2="188" y2="380" stroke-width="1.5"/>
    <line x1="100" y1="396" x2="160" y2="396" stroke-width="1"/>
    <line x1="100" y1="412" x2="172" y2="412" stroke-width="1"/>
    <line x1="836" y1="380" x2="924" y2="380" stroke-width="1.5"/>
    <line x1="864" y1="396" x2="924" y2="396" stroke-width="1"/>
    <line x1="852" y1="412" x2="924" y2="412" stroke-width="1"/>
  </g>

  <!-- === TEXTO === -->
  <!-- Línea degradada superior al texto -->
  <rect x="180" y="658" width="664" height="1.5" rx="1" fill="url(#lineGrad)"/>

  <!-- "MÁQUINA DE VENTAS" -->
  <text
    x="512" y="738"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="78"
    font-weight="900"
    letter-spacing="3"
    text-anchor="middle"
    fill="#ffffff">MÁQUINA DE VENTAS</text>

  <!-- Línea separadora degradada -->
  <rect x="300" y="756" width="424" height="2" rx="1" fill="url(#lineGrad)"/>

  <!-- "PROFESIONAL" -->
  <text
    x="512" y="824"
    font-family="'Arial', sans-serif"
    font-size="42"
    font-weight="400"
    letter-spacing="20"
    text-anchor="middle"
    fill="#4FC3F7"
    opacity="0.80">PROFESIONAL</text>

  <!-- Badge "by InstaVentas" -->
  <rect x="354" y="862" width="316" height="48" rx="24"
    fill="rgba(79,195,247,0.07)"
    stroke="#4FC3F7"
    stroke-width="1"
    opacity="0.55"/>
  <text
    x="512" y="894"
    font-family="'Arial', sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="4"
    text-anchor="middle"
    fill="#4FC3F7"
    opacity="0.60">by InstaVentas</text>

  <!-- Destellos decorativos esquinas -->
  <!-- Superior izquierda -->
  <line x1="148" y1="158" x2="148" y2="194" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="130" y1="176" x2="166" y2="176" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="137" y1="165" x2="159" y2="187" stroke="#4FC3F7" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
  <line x1="159" y1="165" x2="137" y2="187" stroke="#4FC3F7" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>

  <!-- Superior derecha -->
  <line x1="876" y1="158" x2="876" y2="186" stroke="#0866FF" stroke-width="2" stroke-linecap="round" opacity="0.40"/>
  <line x1="862" y1="172" x2="890" y2="172" stroke="#0866FF" stroke-width="2" stroke-linecap="round" opacity="0.40"/>

  <!-- Inferior derecha -->
  <line x1="876" y1="852" x2="876" y2="876" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round" opacity="0.30"/>
  <line x1="864" y1="864" x2="888" y2="864" stroke="#4FC3F7" stroke-width="2" stroke-linecap="round" opacity="0.30"/>

  <!-- Puntos flotantes -->
  <circle cx="198" cy="270" r="3.5" fill="#4FC3F7" opacity="0.30"/>
  <circle cx="826" cy="194" r="4"   fill="#0866FF" opacity="0.35"/>
  <circle cx="856" cy="670" r="3"   fill="#4FC3F7" opacity="0.25"/>
  <circle cx="168" cy="650" r="3"   fill="#0866FF" opacity="0.25"/>
  <circle cx="512" cy="130" r="5"   fill="#4FC3F7" opacity="0.40"/>
  <circle cx="512" cy="958" r="4"   fill="#4FC3F7" opacity="0.28"/>
</svg>