<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <defs>
    <!-- Fondo principal degradado azul-violeta Meta -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0866FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1877F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2FBE;stop-opacity:1" />
    </linearGradient>

    <!-- Degradado acento cyan/verde para aro -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C6FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00F5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0866FF;stop-opacity:1" />
    </linearGradient>

    <!-- Degradado para el aro interior -->
    <linearGradient id="innerRingGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>

    <!-- Degradado para letra M -->
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0EAFF;stop-opacity:1" />
    </linearGradient>

    <!-- Sombra suave para el ícono -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Brillo exterior del círculo principal -->
    <filter id="outerGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="18" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip para redondear el fondo -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>

    <!-- Patrón de puntos de fondo -->
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1.5" fill="rgba(255,255,255,0.07)"/>
    </pattern>
  </defs>

  <!-- Fondo redondeado degradado -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Textura de puntos sutil -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#dots)"/>

  <!-- Arco decorativo exterior (cian/verde) -->
  <circle cx="512" cy="430" r="290" fill="none" stroke="url(#ringGrad)" stroke-width="14" stroke-dasharray="1350 250" stroke-dashoffset="900" opacity="0.85" filter="url(#glow)"/>

  <!-- Arco decorativo medio (naranja/dorado) -->
  <circle cx="512" cy="430" r="260" fill="none" stroke="url(#innerRingGrad)" stroke-width="8" stroke-dasharray="700 960" stroke-dashoffset="200" opacity="0.65"/>

  <!-- Círculo de fondo central -->
  <circle cx="512" cy="430" r="230" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>

  <!-- === ICONO "M" estilizado como símbolo Meta/Infinito === -->
  <!-- La M se construye con trazos gruesos redondeados -->
  <g filter="url(#outerGlow)">
    <!-- Pata izquierda de la M -->
    <line x1="348" y1="580" x2="348" y2="310" stroke="url(#mGrad)" stroke-width="72" stroke-linecap="round"/>
    <!-- Pata derecha de la M -->
    <line x1="676" y1="580" x2="676" y2="310" stroke="url(#mGrad)" stroke-width="72" stroke-linecap="round"/>
    <!-- Brazo izquierdo-centro -->
    <line x1="348" y1="310" x2="512" y2="470" stroke="url(#mGrad)" stroke-width="66" stroke-linecap="round"/>
    <!-- Brazo derecho-centro -->
    <line x1="676" y1="310" x2="512" y2="470" stroke="url(#mGrad)" stroke-width="66" stroke-linecap="round"/>
  </g>

  <!-- Punto brillante en el centro de la V interior (vértice de la M) -->
  <circle cx="512" cy="470" r="22" fill="#00F5A0" opacity="0.95" filter="url(#glow)"/>
  <circle cx="512" cy="470" r="10" fill="#FFFFFF" opacity="1"/>

  <!-- Punto brillante arriba izquierda -->
  <circle cx="348" cy="310" r="14" fill="#00C6FF" opacity="0.9" filter="url(#glow)"/>

  <!-- Punto brillante arriba derecha -->
  <circle cx="676" cy="310" r="14" fill="#00C6FF" opacity="0.9" filter="url(#glow)"/>

  <!-- === TEXTO === -->
  <!-- "Máquina de Ventas" - línea 1 -->
  <text
    x="512" y="672"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="82"
    font-weight="900"
    letter-spacing="2"
    text-anchor="middle"
    fill="#FFFFFF"
    opacity="1"
  >Máquina de</text>

  <!-- "VENTAS" - línea 2 destacada -->
  <text
    x="512" y="754"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="92"
    font-weight="900"
    letter-spacing="10"
    text-anchor="middle"
    fill="url(#ringGrad)"
    opacity="1"
  >VENTAS</text>

  <!-- Línea separadora elegante -->
  <rect x="280" y="772" width="464" height="3" rx="2" fill="url(#ringGrad)" opacity="0.75"/>

  <!-- "Profesional" - subtítulo refinado -->
  <text
    x="512" y="828"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="40"
    font-weight="400"
    letter-spacing="14"
    text-anchor="middle"
    fill="rgba(255,255,255,0.78)"
  >PROFESIONAL</text>

  <!-- Pequeño badge "by InstaVentas" -->
  <rect x="342" y="858" width="340" height="44" rx="22" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
  <text
    x="512" y="887"
    font-family="'Arial', Helvetica, sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="3"
    text-anchor="middle"
    fill="rgba(255,255,255,0.70)"
  >by InstaVentas</text>

  <!-- Destellos decorativos esquinas -->
  <!-- Destello superior izquierda -->
  <g opacity="0.55">
    <line x1="148" y1="140" x2="148" y2="180" stroke="#00F5A0" stroke-width="3" stroke-linecap="round"/>
    <line x1="128" y1="160" x2="168" y2="160" stroke="#00F5A0" stroke-width="3" stroke-linecap="round"/>
    <line x1="135" y1="147" x2="161" y2="173" stroke="#00F5A0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="161" y1="147" x2="135" y2="173" stroke="#00F5A0" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Destello superior derecha -->
  <g opacity="0.45">
    <line x1="876" y1="170" x2="876" y2="200" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="861" y1="185" x2="891" y2="185" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Destello inferior izquierda -->
  <g opacity="0.35">
    <line x1="180" y1="880" x2="180" y2="900" stroke="#00C6FF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="170" y1="890" x2="190" y2="890" stroke="#00C6FF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Pequeños círculos orbitales decorativos -->
  <circle cx="260" cy="220" r="7" fill="#00F5A0" opacity="0.6" filter="url(#glow)"/>
  <circle cx="784" cy="200" r="5" fill="#FFD700" opacity="0.55" filter="url(#glow)"/>
  <circle cx="820" cy="640" r="6" fill="#00C6FF" opacity="0.45" filter="url(#glow)"/>
  <circle cx="200" cy="620" r="5" fill="#FF6B35" opacity="0.4" filter="url(#glow)"/>
</svg>