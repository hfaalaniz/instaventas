<svg viewBox="0 0 1024 1024" width="1024" height="1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#f0ede6"/>
      <stop offset="100%" stop-color="#e8e4db"/>
    </radialGradient>
    <radialGradient id="circleGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e4e0d7"/>
      <stop offset="100%" stop-color="#d6d1c6"/>
    </radialGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#b8b0a0" flood-opacity="0.18"/>
    </filter>
    <filter id="dotShadow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#FF6B35" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fondo arena suave -->
  <rect width="1024" height="1024" rx="210" ry="210" fill="url(#bgGrad)"/>

  <!-- Círculo principal arena oscura -->
  <circle cx="512" cy="430" r="308" fill="url(#circleGrad)" filter="url(#softShadow)"/>

  <!-- Aro exterior sutil -->
  <circle cx="512" cy="430" r="308" fill="none" stroke="#c8c2b4" stroke-width="1.5"/>

  <!-- Aro interior muy sutil -->
  <circle cx="512" cy="430" r="278" fill="none" stroke="#cec9bc" stroke-width="0.8" opacity="0.6"/>

  <!-- === M bold minimal === -->
  <!-- Sombra suave detrás de la M -->
  <g opacity="0.08">
    <line x1="322" y1="596" x2="322" y2="290" stroke="#1a1a1a" stroke-width="72" stroke-linecap="round"/>
    <line x1="702" y1="596" x2="702" y2="290" stroke="#1a1a1a" stroke-width="72" stroke-linecap="round"/>
    <line x1="322" y1="290" x2="512" y2="478" stroke="#1a1a1a" stroke-width="66" stroke-linecap="round"/>
    <line x1="702" y1="290" x2="512" y2="478" stroke="#1a1a1a" stroke-width="66" stroke-linecap="round"/>
  </g>

  <!-- M principal color carbón -->
  <line x1="322" y1="596" x2="322" y2="290" stroke="#1e1c18" stroke-width="58" stroke-linecap="round"/>
  <line x1="702" y1="596" x2="702" y2="290" stroke="#1e1c18" stroke-width="58" stroke-linecap="round"/>
  <line x1="322" y1="290" x2="512" y2="478" stroke="#1e1c18" stroke-width="52" stroke-linecap="round"/>
  <line x1="702" y1="290" x2="512" y2="478" stroke="#1e1c18" stroke-width="52" stroke-linecap="round"/>

  <!-- Punto acento naranja con sombra -->
  <circle cx="512" cy="478" r="34" fill="#FF6B35" filter="url(#dotShadow)"/>
  <circle cx="512" cy="478" r="18" fill="#ff8c5a"/>

  <!-- Pequeño highlight blanco en el dot -->
  <circle cx="502" cy="468" r="7" fill="rgba(255,255,255,0.45)"/>

  <!-- Puntos vértice superiores (carbón, pequeños) -->
  <circle cx="322" cy="290" r="10" fill="#1e1c18" opacity="0.4"/>
  <circle cx="702" cy="290" r="10" fill="#1e1c18" opacity="0.4"/>

  <!-- === SEPARADOR === -->
  <rect x="232" y="782" width="560" height="2" rx="1" fill="#1e1c18" opacity="0.10"/>

  <!-- === TEXTO === -->
  <!-- "MÁQUINA DE VENTAS" -->
  <text
    x="512" y="754"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="76"
    font-weight="900"
    letter-spacing="3"
    text-anchor="middle"
    fill="#1e1c18">MÁQUINA DE VENTAS</text>

  <!-- Línea acento naranja bajo el título -->
  <rect x="352" y="770" width="320" height="3.5" rx="1.5" fill="#FF6B35" opacity="0.75"/>

  <!-- "PROFESIONAL" -->
  <text
    x="512" y="844"
    font-family="'Arial', sans-serif"
    font-size="40"
    font-weight="400"
    letter-spacing="18"
    text-anchor="middle"
    fill="#6b6558">PROFESIONAL</text>

  <!-- Badge "by InstaVentas" -->
  <rect x="368" y="878" width="288" height="46" rx="23" fill="rgba(30,28,24,0.06)" stroke="#1e1c18" stroke-width="1" opacity="0.35"/>
  <text
    x="512" y="908"
    font-family="'Arial', sans-serif"
    font-size="21"
    font-weight="600"
    letter-spacing="3"
    text-anchor="middle"
    fill="#6b6558">by InstaVentas</text>

  <!-- Detalles decorativos esquinas — líneas finas carbón -->
  <!-- Superior izquierda -->
  <line x1="148" y1="148" x2="190" y2="148" stroke="#1e1c18" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
  <line x1="148" y1="148" x2="148" y2="190" stroke="#1e1c18" stroke-width="2" stroke-linecap="round" opacity="0.18"/>

  <!-- Superior derecha -->
  <line x1="876" y1="148" x2="834" y2="148" stroke="#1e1c18" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
  <line x1="876" y1="148" x2="876" y2="190" stroke="#1e1c18" stroke-width="2" stroke-linecap="round" opacity="0.18"/>

  <!-- Inferior izquierda -->
  <line x1="148" y1="876" x2="190" y2="876" stroke="#1e1c18" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
  <line x1="148" y1="876" x2="148" y2="834" stroke="#1e1c18" stroke-width="2" stroke-linecap="round" opacity="0.18"/>

  <!-- Inferior derecha -->
  <line x1="876" y1="876" x2="834" y2="876" stroke="#1e1c18" stroke-width="2" stroke-linecap="round" opacity="0.18"/>
  <line x1="876" y1="876" x2="876" y2="834" stroke="#1e1c18" stroke-width="2" stroke-linecap="round" opacity="0.18"/>

  <!-- Pequeño punto naranja decorativo -->
  <circle cx="512" cy="136" r="5" fill="#FF6B35" opacity="0.5"/>
  <circle cx="512" cy="960" r="5" fill="#FF6B35" opacity="0.35"/>
</svg>